<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geolize</title>
    <link rel="icon" type="image/png" sizes="82x82" href="img/Logo.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="img/Logo.png" />
    <link rel="apple-touch-icon" href="img/Logo.png" />

    <!-- REACT -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Fontes -->
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap"
        rel="stylesheet" />

    <!-- CSS global -->
    <link rel="stylesheet" href="style.css" />

    <!-- CSS dos componentes -->
    <link rel="stylesheet" href="css/Navbar.css" />
    <link rel="stylesheet" href="css/Home.css" />
    <link rel="stylesheet" href="css/Hero.css" />
    <link rel="stylesheet" href="css/Sobre.css" />
    <link rel="stylesheet" href="css/Equipe.css" />
    <link rel="stylesheet" href="css/Footer.css" />

    <!-- Componentes JSX -->
    <script type="text/babel" src="components/Navbar.jsx"></script>
    <script type="text/babel" src="components/Home.jsx"></script>
    <script type="text/babel" src="components/Hero.jsx"></script>
    <script type="text/babel" src="components/Sobre.jsx"></script>
    <script type="text/babel" src="components/Equipe.jsx"></script>
    <script type="text/babel" src="components/Footer.jsx"></script>
</head>

<body>
    <div id="root">
        <script type="text/babel">
            function App() {
                return (
                    <>
                        <Navbar />
                        <Home />
                        <Hero />
                        <Sobre />
                        <Equipe />
                        <Footer />
                    </>
                );
            }

            ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        </script>
    </div>

    <script type="module" src="animation.js"></script>
</body>

</html>
