<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Geolize</title>

    <!-- REACT Fica aqui gurizada -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- DaisyUI + Tailwind OUUU Bootstrap-->

    <!--CSS customizado, sempre dps do Daisy ou boots-->
    <link rel="stylesheet" href="style.css" />

    <!--CSS De cada página/componente-->
    <link rel="stylesheet" href="css/Navbar.css" />
    <link rel="stylesheet" href="css/Home.css" />
    <link rel="stylesheet" href="css/Hero.css" />
    <link rel="stylesheet" href="css/Footer.css" />



    <!-- Aqui fica a parte dos componentes, tem que ser em ordem que vai aparecer:
    Navbar, Home e assim por diante -->
    <script type="text/babel" src="components/Navbar.jsx"></script>
    <script type="text/babel" src="components/Home.jsx"></script>
    <script type="text/babel" src="components/Hero.jsx"></script>
    <script type="text/babel" src="components/Footer.jsx"></script>
</head>

<body>
    <div id="root">
        <script type="text/babel">
            function App() {
                return (
                    <>
                        <Navbar />
                        <Home />
                        <Hero />
                        <Footer />
                        
                    </>
                );
            }

            ReactDOM.createRoot(document.getElementById('root')).render(<App />);
        </script>
    </div>
</body>

</html>
